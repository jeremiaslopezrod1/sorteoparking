<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Super Admin — SorteoParking</title>
  <meta name="description" content="Panel de administración global de SorteoParking." />
  <link rel="stylesheet" href="/static/global.css" />
  <style>
    .login-card {
      max-width: 400px;
      margin: 80px auto;
      padding: 40px;
      background: var(--canvas);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow-md);
    }
    .login-logo {
      text-align: center;
      margin-bottom: 32px;
    }
    .login-logo h1 {
      font-size: 24px;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 4px;
    }
    .login-logo p {
      font-size: 15px;
      color: var(--ink-secondary);
    }
    .login-error {
      font-size: 13px;
      color: var(--ink-error);
      text-align: center;
      margin-top: 12px;
      display: none;
    }
    .login-error.visible { display: block; }

  /* ── Responsive Design (Apple Breakpoints) ── */
  * { box-sizing: border-box; }

  @media (max-width: 640px) {
    body { padding: 0 12px; }
    .login-card { margin: 40px 12px; padding: 24px; max-width: 100%; }
  }

  @media (max-width: 833px) {
    nav, .global-nav {
      flex-wrap: wrap; height: auto !important;
      padding: 8px 12px !important;
      gap: 4px;
    }
  }
  </style>
</head>
<body>
  <nav class="nav" role="navigation" aria-label="Navegación principal">
    <a href="/static/index.html" class="nav-brand" style="text-decoration:none;color:inherit;">
      <svg viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" width="18" height="18">
        <rect x="2" y="4" width="14" height="10" rx="2"/>
        <path d="M6 8h6M6 11h4"/>
      </svg>
      SorteoParking
    </a>
    <div class="nav-actions">
      <a href="/static/index.html" class="nav-link" style="opacity:0.75;">← Volver al inicio</a>
    </div>
  </nav>

  <!-- Login -->
  <div id="login-view">
    <div class="login-card">
      <div class="login-logo">
        <svg viewBox="0 0 40 40" width="40" height="40" fill="none" stroke="var(--accent)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="4" y="8" width="32" height="24" rx="4"/>
          <path d="M12 18h16M12 24h12"/>
        </svg>
        <h1>SorteoParking</h1>
        <p>Super Admin</p>
      </div>
      <form id="login-form">
        <div class="input-group">
          <label class="input-label" for="username">Usuario</label>
          <input id="username" class="input" required autocomplete="username" />
        </div>
        <div class="input-group">
          <label class="input-label" for="password">Contraseña</label>
          <input id="password" class="input" type="password" required autocomplete="current-password" />
        </div>

        <p id="login-error" class="login-error">Credenciales inválidas</p>
        <button id="login-btn" class="btn btn-primary btn-lg btn-block" type="submit">
          Iniciar sesión
        </button>
        <p style="text-align:center;margin-top:16px;font-size:14px;">
          <a href="/static/reset-password.html" style="color:var(--ink-secondary);text-decoration:underline;">¿Olvidó su contraseña?</a>
        </p>
      </form>
    </div>
  </div>

  <script>
    let token = null;
    let _csrfToken = null;

    function getCsrfToken() {
      if (_csrfToken) return _csrfToken;
      _csrfToken = getCookie('csrf_token');
      return _csrfToken;
    }

    function getCookie(n) {
      const cookies = document.cookie.split(';');
      for (let c of cookies) {
        const [key, ...val] = c.trim().split('=');
        if (key === n) return val.join('=');
      }
      return null;
    }

    async function handleLogin() {
      const user = document.getElementById('username').value.trim();
      const pass = document.getElementById('password').value;
      const errEl = document.getElementById('login-error');
      document.getElementById('login-btn').disabled = true;

      const body = { username: user, password: pass };

      try {
        const res = await fetch('/auth/login/superadmin', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'include',
          body: JSON.stringify(body),
        });
        const data = await res.json();
        if (res.ok) {
          _csrfToken = data.csrf_token;
          await new Promise(r => setTimeout(r, 150));
          window.location.href = '/static/superadmin.html';
        } else {
          errEl.textContent = data.detail || 'Credenciales incorrectas';
          errEl.className = 'login-error visible';
          document.getElementById('login-btn').disabled = false;
          document.getElementById('password').value = '';
          document.getElementById('username').focus();
        }
      } catch(e) {
        errEl.textContent = 'Error de conexión';
        errEl.className = 'login-error visible';
        document.getElementById('login-btn').disabled = false;
      }
    }

    document.getElementById('login-form').addEventListener('submit', (e) => {
      e.preventDefault();
      handleLogin();
    });

  </script>
</body>
</html>
