<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SorteoParking — Restablecer contraseña</title>
  <link rel="stylesheet" href="/static/global.css" />
  <style>
    .reset-card {
      max-width: 420px;
      margin: 80px auto;
      padding: 40px;
      background: var(--canvas);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow-md);
    }
    .reset-logo {
      text-align: center;
      margin-bottom: 32px;
    }
    .reset-logo h1 {
      font-size: 24px;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 4px;
    }
    .reset-logo p {
      font-size: 15px;
      color: var(--ink-secondary);
    }
    .reset-error {
      font-size: 13px;
      color: var(--ink-error);
      text-align: center;
      margin-top: 12px;
      display: none;
    }
    .reset-error.visible { display: block; }
    .reset-success {
      font-size: 14px;
      color: var(--ink-success, #16a34a);
      text-align: center;
      margin-top: 12px;
      display: none;
    }
    .reset-success.visible { display: block; }
    #reset-form, #request-form { transition: opacity 0.2s; }
    .hidden-form { display: none; }
    .back-link {
      display: block;
      text-align: center;
      margin-top: 20px;
      font-size: 14px;
      color: var(--ink-secondary);
    }
    .back-link a {
      color: var(--accent);
      text-decoration: none;
    }
  </style>
</head>
<body>
  <nav class="nav" role="navigation">
    <div class="nav-brand">
      <svg viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.5" width="18" height="18">
        <rect x="2" y="4" width="14" height="10" rx="2"/>
        <path d="M6 8h6M6 11h4"/>
      </svg>
      SorteoParking
    </div>
  </nav>

  <div id="request-view">
    <div class="reset-card">
      <div class="reset-logo">
        <h1>Recuperar contraseña</h1>
        <p>Super Admin</p>
      </div>
      <form id="request-form">
        <div class="input-group">
          <label class="input-label" for="email">Correo electrónico</label>
          <input id="email" class="input" type="email" required autocomplete="email" placeholder="admin@ejemplo.com" />
        </div>
        <p id="request-error" class="reset-error"></p>
        <p id="request-success" class="reset-success"></p>
        <button id="request-btn" class="btn btn-primary btn-lg btn-block" type="submit">
          Enviar instrucciones
        </button>
      </form>
      <div class="back-link">
        <a href="/static/superadmin.html">← Volver al inicio de sesión</a>
      </div>
    </div>
  </div>

  <div id="reset-view" class="hidden-form">
    <div class="reset-card">
      <div class="reset-logo">
        <h1>Nueva contraseña</h1>
        <p>Super Admin</p>
      </div>
      <form id="reset-form">
        <div class="input-group">
          <label class="input-label" for="new-password">Nueva contraseña</label>
          <input id="new-password" class="input" type="password" required minlength="8" autocomplete="new-password" />
        </div>
        <div class="input-group">
          <label class="input-label" for="confirm-password">Confirmar contraseña</label>
          <input id="confirm-password" class="input" type="password" required minlength="8" autocomplete="new-password" />
        </div>
        <p id="reset-error" class="reset-error"></p>
        <p id="reset-success" class="reset-success"></p>
        <button id="reset-btn" class="btn btn-primary btn-lg btn-block" type="submit">
          Cambiar contraseña
        </button>
      </form>
      <div class="back-link">
        <a href="/static/superadmin.html">← Volver al inicio de sesión</a>
      </div>
    </div>
  </div>

  <script>
    // Detectar si hay token en la URL → mostrar formulario de reset
    const params = new URLSearchParams(window.location.search);
    const token = params.get('token');

    if (token) {
      // Mostrar formulario de nueva contraseña
      document.getElementById('request-view').style.display = 'none';
      document.getElementById('reset-view').classList.remove('hidden-form');
    }

    // ── Solicitar reset ──────────────────────────────────────────
    document.getElementById('request-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      const btn = document.getElementById('request-btn');
      const errEl = document.getElementById('request-error');
      const okEl = document.getElementById('request-success');

      errEl.classList.remove('visible');
      okEl.classList.remove('visible');
      btn.disabled = true;
      btn.textContent = 'Enviando...';

      try {
        const res = await fetch('/auth/request-password-reset', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email }),
        });
        const data = await res.json();
        okEl.textContent = data.message || 'Revisa tu correo.';
        okEl.classList.add('visible');
      } catch (err) {
        errEl.textContent = 'Error de conexión: ' + err.message;
        errEl.classList.add('visible');
      }
      btn.disabled = false;
      btn.textContent = 'Enviar instrucciones';
    });

    // ── Reset password ───────────────────────────────────────────
    if (token) {
      document.getElementById('reset-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const newPassword = document.getElementById('new-password').value;
        const confirmPassword = document.getElementById('confirm-password').value;
        const btn = document.getElementById('reset-btn');
        const errEl = document.getElementById('reset-error');
        const okEl = document.getElementById('reset-success');

        errEl.classList.remove('visible');
        okEl.classList.remove('visible');

        if (newPassword !== confirmPassword) {
          errEl.textContent = 'Las contraseñas no coinciden.';
          errEl.classList.add('visible');
          return;
        }

        if (newPassword.length < 8) {
          errEl.textContent = 'La contraseña debe tener al menos 8 caracteres.';
          errEl.classList.add('visible');
          return;
        }

        btn.disabled = true;
        btn.textContent = 'Cambiando...';

        try {
          const res = await fetch('/auth/reset-password', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ token, new_password: newPassword }),
          });
          const data = await res.json();

          if (res.ok) {
            okEl.textContent = data.message || 'Contraseña actualizada.';
            okEl.classList.add('visible');
            // Redirigir al login después de 3 segundos
            setTimeout(() => {
              window.location.href = '/static/superadmin.html';
            }, 3000);
          } else {
            errEl.textContent = data.detail || 'Error al cambiar contraseña.';
            errEl.classList.add('visible');
          }
        } catch (err) {
          errEl.textContent = 'Error de conexión: ' + err.message;
          errEl.classList.add('visible');
        }
        btn.disabled = false;
        btn.textContent = 'Cambiar contraseña';
      });
    }
  </script>
</body>
</html>
