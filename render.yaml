services:
  - type: web
    name: sorteoparking
    env: python
    region: ohio
    plan: free
    branch: main
    rootDir: sorteoparking
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port \
    healthCheckPath: /health
    envVars:
      - key: APP_ENV
        value: production
